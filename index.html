<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado</title>
    <style>
        body { 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        #login { 
            text-align: center; 
            background: #1e1e1e; 
            padding: 50px; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        input { 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            width: 80%; 
            background: #111;
            color: white;
            font-size: 18px; 
            text-align: center; 
            margin-bottom: 20px;
        }

        button { 
            padding: 12px 30px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }

        #contenedor-juego { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
        }

        iframe { 
            width: 100%; 
            height: calc(100% + 150px); 
            position: absolute; 
            top: -115px; 
            left: 0; 
            border: none; 
        }

        /* BOTÓN DE SALIDA GIGANTE */
        #btn-exit {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            padding: 25px 50px; 
            background: #ff0000; 
            color: white;
            border: 3px solid white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 24px; 
            font-weight: bold;
            display: none; 
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
        #btn-exit:hover { background: #cc0000; transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- Botón de pánico GIGANTE -->
    <button id="btn-exit" onclick="salirRapido()">SALIR RÁPIDO (Q / ESC)</button>

    <div id="login">
        <h2>Identificación</h2>
        <input type="password" id="pass" placeholder="Introducir PIN">
        <br>
        <button onclick="acceder()">CONTINUAR</button>
    </div>

    <div id="contenedor-juego">
        <iframe src="https://www.youtube.com/shorts/"></iframe>
    </div>

    <script>
        var websFalsas = [
            "https://www.walinwa.net/student/session/play"
        ];

        function acceder() {
            var codigosValidos = ["SAM55", "MOIN"]; // Pon tus códigos aquí
            var input = document.getElementById("pass").value;

            if (codigosValidos.includes(input)) {
                document.getElementById("login").style.display = "none";
                document.getElementById("contenedor-juego").style.display = "block";
                document.getElementById("btn-exit").style.display = "block"; 
            } else {
                window.location.href = "https://webuntis.com";
            }
        }

        function salirRapido() {
            var azar = Math.floor(Math.random() * websFalsas.length);
            window.location.href = websFalsas[azar];
        }

        // Atajos de teclado: Enter para entrar, "Q" o "Esc" para salir
        document.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                if(document.getElementById("login").style.display !== "none") {
                    acceder();
                }
            }
            // Detecta la tecla Q o la tecla Escape (Esc)
            if (event.key.toLowerCase() === "q" || event.key === "Escape") {
                if(document.getElementById("contenedor-juego").style.display === "block") {
                    salirRapido();
                }
            }
        });
    </script>
</body>
</html>
