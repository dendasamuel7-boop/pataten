<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado</title>
    <style>
        body { 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        #login { 
            text-align: center; 
            background: #1e1e1e; 
            padding: 50px; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        input { 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            width: 80%; 
            background: #111;
            color: white;
            font-size: 18px; 
            text-align: center; 
            margin-bottom: 20px;
        }

        button { 
            padding: 12px 30px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }

        #contenedor-juego { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
        }

        iframe { 
            width: 100%; 
            height: calc(100% + 150px); 
            position: absolute; 
            top: -115px; 
            left: 0; 
            border: none; 
        }

        /* BOTÓN DE SALIDA RÁPIDA */
        #btn-exit {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 9999; /* Para que esté siempre encima de todo */
            padding: 8px 15px;
            background: rgba(255, 0, 0, 0.5); /* Rojo semitransparente para que no llame mucho la atención */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            display: none; /* Solo se verá cuando entres al juego */
        }
        #btn-exit:hover { background: red; }
    </style>
</head>
<body>

    <!-- Botón de pánico -->
    <button id="btn-exit" onclick="salirRapido()">EXIT</button>

    <div id="login">
        <h2>Identificación</h2>
        <input type="password" id="pass" placeholder="Introducir PIN">
        <br>
        <button onclick="acceder()">CONTINUAR</button>
    </div>

    <div id="contenedor-juego">
        <iframe src="https://tinyfishingame.com/blumgi-ball/"></iframe>
    </div>

    <script>
        // Lista de webs para despistar
        var websFalsas = [
            "https://webuntis.com",
            "https://office.com",
            "https://google.com"
        ];

        function acceder() {
            var codigosValidos = ["SAM55", "MOIN"]; // Pon tus códigos aquí
            var input = document.getElementById("pass").value;

            if (codigosValidos.includes(input)) {
                document.getElementById("login").style.display = "none";
                document.getElementById("contenedor-juego").style.display = "block";
                document.getElementById("btn-exit").style.display = "block"; // Mostrar botón EXIT
            } else {
                window.location.href = websFalsas[0]; // Manda a WebUntis si falla
            }
        }

        function salirRapido() {
            // Elige una web al azar de la lista y te manda allí inmediatamente
            var azar = Math.floor(Math.random() * websFalsas.length);
            window.location.href = websFalsas[azar];
        }

        document.getElementById("pass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { acceder(); }
        });
    </script>
</body>
</html>
